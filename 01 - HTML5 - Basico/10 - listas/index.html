<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Listas</h1>

    <h2>Lista de compras - Não ordenada</h2>
    <ul> <!-- Lista não ordenada - Unordered List-->
        <li>Café</li> <!-- List Item-->
        <li>Filtro de Café</li>
        <li>Bolo de Chocolate</li>
        <li>Energético</li>
    </ul>

    <h2>Lista ordenada</h2>
    <ol> <!-- Lista ordenada - Ordered List-->
        <li>Fabio</li>
        <li>Luiz</li>
        <li>Régis</li>
        <li>Bruno</li>
    </ol>
</body>
</html>
